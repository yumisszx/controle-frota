    <main>
        <h1>Cadastro de Veículo</h1>
        <div class="bg-insercao">
            <p>Informe todos os dados abaixo</p>
            <section class="left">
                <div class="mb-3">
                    <label for="formGroupExampleInput" class="form-label">Chassi</label>
                    <input type="text" class="form-control" id="formGroupExampleInput"
                        placeholder="Example input placeholder">
                </div>

                <div class="mb-3">
                    <label for="formGroupExampleInput2" class="form-label">Renavam</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2"
                        placeholder="Another input placeholder">
                </div>

                <div class="mb-3">
                    <label for="formGroupExampleInput" class="form-label">Placa</label>
                    <input type="text" class="form-control" id="formGroupExampleInput"
                        placeholder="Example input placeholder">
                </div>

                <div class="mb-3">
                    <label for="formGroupExampleInput2" class="form-label">Marca</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2"
                        placeholder="Another input placeholder">
                </div>

                <div class="mb-3">
                    <label for="formGroupExampleInput2" class="form-label">Modelo</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2"
                        placeholder="Another input placeholder">
                </div>
            </section>

            <section class="right">
                <div class="input-group mb-3">
                    <select class="form-select" aria-label="Default select example">
                        <option selected>Tipo de veículo</option>
                        <option value="1"></option>
                        <option value="2"></option>
                        <option value="3"></option>
                        <option value="4"></option>
                        <option value="5"></option>
                        <option value="6"></option>
                        <option value="7"></option>
                        <option value="8"></option>
                        <option value="9"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="formGroupExampleInput2" class="form-label">Ano</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2"
                        placeholder="Another input placeholder">
                </div>

                <div class="mb-3">
                    <label for="formGroupExampleInput2" class="form-label">Capacidade de carga</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2"
                        placeholder="Another input placeholder">
                </div>

                <div class="mb-3">
                    <label for="formGroupExampleInput2" class="form-label">Km Atual do veículo</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2"
                        placeholder="Another input placeholder">
                </div>
